# CVE / KVE entries disclosed by CSL members.
# Page template: _pages/cves.md
#
# Each entry:
#   id:        CVE-YYYY-NNNN or KVE-YYYY-NNNN
#   url:       advisory URL (omit to fall back to KVE portal)
#   title:     short title shown in bold
#   tag:       dos | rce | cmd | kbypass   (drives colored badge)
#   tag_label: text shown in the badge (defaults to tag upper-case)
#   reporter:  name of the CSL reporter
#   category:  short descriptor after reporter (e.g., "Binary analysis")
#   desc:      one-paragraph description (markdown OK)
#   publication: optional — {text: ..., links: [{label, url}]}
#
# Entries are grouped by `year` blocks which are rendered in the order
# they appear here (put newest first).

kve_portal: https://knvd.krcert.or.kr/

groups:
  - year: 2025
    items:
      - id: KVE-2025-0470
        url: https://knvd.krcert.or.kr/
        title: Remote Code Execution in AhnLab V3 Lite
        tag: rce
        reporter: Chanhee Park
        category: Binary analysis
        desc: |
          Remote code execution vulnerability identified in AhnLab V3 Lite, a
          consumer anti-malware product widely deployed in Korea. Reported to
          the vendor and coordinated through KrCERT/CC.

      - id: KVE-2025-0471
        url: https://knvd.krcert.or.kr/
        title: Denial of Service in AhnLab V3 Lite
        tag: dos
        reporter: Chanhee Park
        category: Binary analysis
        desc: |
          Denial-of-service flaw in AhnLab V3 Lite enabling a local attacker to
          crash or disable the anti-malware agent.

      - id: KVE-2025-0472
        url: https://knvd.krcert.or.kr/
        title: Remote Code Execution in AhnLab V3 Lite
        tag: rce
        reporter: Chanhee Park
        category: Binary analysis
        desc: |
          Second RCE primitive affecting AhnLab V3 Lite, distinct from
          KVE-2025-0470. Disclosed in coordination with the vendor.

      - id: KVE-2025-0473
        url: https://knvd.krcert.or.kr/
        title: Denial of Service in SGA EPS Virus Chaser
        tag: dos
        reporter: Chanhee Park
        category: Binary analysis
        desc: |
          Denial-of-service vulnerability in SGA Solutions' EPS Virus Chaser
          endpoint protection product that allows the security service to be
          terminated or left in an inconsistent state.

      - id: CVE-2025-45856
        url: https://nvd.nist.gov/vuln/detail/CVE-2025-45856
        title: Denial of Service in CatchPulse Pro
        tag: dos
        reporter: Chanhee Park
        category: Binary analysis
        desc: |
          Denial-of-service flaw in the CatchPulse Pro endpoint security product
          (formerly SecureAge APEX) allowing a local attacker to disable the
          protection driver.

      - id: CVE-2025-51620
        url: https://nvd.nist.gov/vuln/detail/CVE-2025-51620
        title: Denial of Service in IObit Malware Fighter
        tag: dos
        reporter: Chanhee Park
        category: Binary analysis
        desc: |
          Denial-of-service vulnerability in IObit Malware Fighter that
          terminates or destabilizes the security agent's kernel-mode driver.

      - id: CVE-2025-55456
        url: https://nvd.nist.gov/vuln/detail/CVE-2025-55456
        title: Denial of Service in iTop Easy Desktop
        tag: dos
        reporter: Chanhee Park
        category: Binary analysis
        desc: |
          Flaw in iTop Easy Desktop that can be abused to crash the
          application's helper service, leading to denial of service.

      - id: CVE-2025-55457
        url: https://nvd.nist.gov/vuln/detail/CVE-2025-55457
        title: Denial of Service in iTop VPN
        tag: dos
        reporter: Chanhee Park
        category: Binary analysis
        desc: |
          Denial-of-service vulnerability in the iTop VPN client that allows an
