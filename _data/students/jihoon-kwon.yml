biography: |
  Jihoon Kwon is an undergraduate intern in the Computer Systems Security Lab
  at Korea University, advised by Prof. Youngjoo Shin. His research interests
  include operating system security, kernel-level vulnerability analysis,
  filesystem security, and system-level exploitation.

