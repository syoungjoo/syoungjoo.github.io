biography: |
  Minchang Kim is an M.S. student in the Computer Systems Security Lab at Korea
  University, advised by Prof. Youngjoo Shin. His research interests include
  network security, cloud security, and binary analysis. Prior to joining the
  lab he served as an Army Cyber Operations Officer and worked at the National
  Defense Integrated Data Center.

