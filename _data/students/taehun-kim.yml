biography: |
  Taehun Kim is a Ph.D. student in the Computer Systems Security Lab at
  Korea University, advised by Prof. Youngjoo Shin. His research centers on
  CPU microarchitectural attacks and defenses across Intel, AMD, ARM, and
  Apple Silicon processors, with particular interest in device-driven attacks
  leveraging SmartNICs, GPUs, and NPUs, and in the security evaluation of
  trusted execution environments including Intel SGX/TDX, AMD SEV, and ARM TrustZone.

