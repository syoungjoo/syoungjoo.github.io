biography: |
  Jihu Cha is an undergraduate intern in the Computer Systems Security Lab at
  Korea University, advised by Prof. Youngjoo Shin. Pursuing a double major in
  Smart Security and Biomedical Engineering, her interests span embedded
  systems security, side-channel attacks, and security for medical and IoMT
  devices.

