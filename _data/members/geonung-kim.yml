biography: |
  Geonung Kim is an integrated Ph.D./M.S. student in the Computer Systems Security
  Lab at Korea University, advised by Prof. Youngjoo Shin. His research interests
  include binary analysis, embedded system security, and defense security. Before
  joining the lab, he worked as a Source Code Security Engineer at Fin Security.

