name: Render a CV

# Builds _data/cv.yml from professor.yml + members.yml + papers.bib,
# then renders a PDF via RenderCV and commits the output back.
# See bin/build_cv.py for the conversion logic.

on:
  push:
    branches:
      - main
      - master
    paths:
      - "_data/professor.yml"
      - "_data/members.yml"
      - "_bibliography/papers.bib"
      - "bin/build_cv.py"
      - "requirements.txt"
      - ".github/workflows/render-cv.yml"
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write
  actions: write    # needed to dispatch the deploy workflow

jobs:
  rendercv:
    name: RenderCV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build _data/cv.yml from site data
        run: python bin/build_cv.py

      - name: Render CV to PDF
        run: |
          mkdir -p assets/rendercv/rendercv_output
          rendercv render _data/cv.yml \
            --output-folder-name assets/rendercv/rendercv_output \
            --dont-generate-html \
            --dont-generate-markdown \
            --dont-generate-png

      - name: Upload rendercv_output as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: RenderCV Output
          path: assets/rendercv/rendercv_output

      - name: Commit changes
        id: commit
        run: |
          git config --global user.name  "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git add _data/cv.yml assets/rendercv/rendercv_output || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: render the latest CV"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # GITHUB_TOKEN-pushed commits don't trigger other workflows, so we
      # explicitly dispatch the deploy workflow when something changed.
      - name: Trigger deploy workflow
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
